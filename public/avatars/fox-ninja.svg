<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1a1a2e"/>
  <!-- Ninja mask (covering lower face) -->
  <rect x="28" y="62" width="44" height="20" rx="4" fill="#111"/>
  <!-- Ninja headband -->
  <rect x="26" y="38" width="48" height="10" rx="3" fill="#111"/>
  <rect x="60" y="36" width="18" height="5" rx="2" fill="#111" transform="rotate(20,60,36)"/>
  <!-- Fox ears -->
  <polygon points="34,42 26,20 44,38" fill="#d4602a"/>
  <polygon points="66,42 74,20 56,38" fill="#d4602a"/>
  <polygon points="34,41 30,26 42,39" fill="#f0e0d0"/>
  <polygon points="66,41 70,26 58,39" fill="#f0e0d0"/>
  <!-- Fox face -->
  <ellipse cx="50" cy="56" rx="20" ry="18" fill="#d4602a"/>
  <!-- White muzzle area -->
  <ellipse cx="50" cy="60" rx="12" ry="9" fill="#f5e8d8"/>
  <!-- Eyes (showing above mask) -->
  <ellipse cx="42" cy="53" rx="5" ry="4" fill="#f5c842"/>
  <ellipse cx="58" cy="53" rx="5" ry="4" fill="#f5c842"/>
  <ellipse cx="42" cy="53" rx="2" ry="3" fill="#1a1a1a"/>
  <ellipse cx="58" cy="53" rx="2" ry="3" fill="#1a1a1a"/>
  <circle cx="41" cy="52" r="1" fill="white"/>
  <circle cx="57" cy="52" r="1" fill="white"/>
  <!-- Nose tip peeking above mask -->
  <ellipse cx="50" cy="62" rx="3" ry="2" fill="#8b4a3a"/>
</svg>
