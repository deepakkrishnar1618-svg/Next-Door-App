<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#7b2d8b"/>
  <!-- Samurai helmet (kabuto) -->
  <ellipse cx="50" cy="38" rx="20" ry="12" fill="#2c2c2c"/>
  <rect x="30" y="38" width="40" height="8" rx="1" fill="#1a1a1a"/>
  <rect x="26" y="42" width="48" height="5" rx="2" fill="#8b0000"/>
  <!-- Tall rabbit ears -->
  <ellipse cx="36" cy="26" rx="6" ry="16" fill="white" transform="rotate(-8,36,26)"/>
  <ellipse cx="64" cy="26" rx="6" ry="16" fill="white" transform="rotate(8,64,26)"/>
  <ellipse cx="36" cy="26" rx="3" ry="12" fill="#f0a0b0" transform="rotate(-8,36,26)"/>
  <ellipse cx="64" cy="26" rx="3" ry="12" fill="#f0a0b0" transform="rotate(8,64,26)"/>
  <!-- Rabbit face -->
  <ellipse cx="50" cy="62" rx="20" ry="18" fill="white"/>
  <!-- Eyes -->
  <circle cx="42" cy="59" r="4" fill="white"/>
  <circle cx="58" cy="59" r="4" fill="white"/>
  <circle cx="42" cy="59" r="2.5" fill="#cc4444"/>
  <circle cx="58" cy="59" r="2.5" fill="#cc4444"/>
  <circle cx="43" cy="58" r="1" fill="white"/>
  <circle cx="59" cy="58" r="1" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="66" rx="3" ry="2" fill="#e87a8c"/>
  <!-- Mouth -->
  <path d="M47 68 Q50 72 53 68" stroke="#b05060" stroke-width="1.5" fill="none"/>
  <!-- Whiskers -->
  <line x1="30" y1="65" x2="46" y2="66" stroke="#aaa" stroke-width="0.8"/>
  <line x1="30" y1="68" x2="46" y2="68" stroke="#aaa" stroke-width="0.8"/>
  <line x1="70" y1="65" x2="54" y2="66" stroke="#aaa" stroke-width="0.8"/>
  <line x1="70" y1="68" x2="54" y2="68" stroke="#aaa" stroke-width="0.8"/>
  <!-- Armor collar -->
  <path d="M32 76 Q50 84 68 76" stroke="#8b0000" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
