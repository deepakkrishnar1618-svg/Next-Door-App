  <rect x="28" y="22" width="44" height="18" rx="4" fill="#8b6914"/>
  <rect x="24" y="34" width="52" height="8" rx="2" fill="#6b5012"/>
  <ellipse cx="24" cy="38" rx="4" ry="6" fill="#c0c0c0"/>
  <ellipse cx="76" cy="38" rx="4" ry="6" fill="#c0c0c0"/>
  <!-- Dog face -->
  <ellipse cx="50" cy="58" rx="22" ry="20" fill="#d4a574"/>
  <!-- Ears -->
  <ellipse cx="30" cy="48" rx="8" ry="12" fill="#c4956a" transform="rotate(-15,30,48)"/>
  <ellipse cx="70" cy="48" rx="8" ry="12" fill="#c4956a" transform="rotate(15,70,48)"/>
  <!-- Eyes -->
  <circle cx="42" cy="56" r="4" fill="white"/>
