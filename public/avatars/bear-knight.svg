<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#2a4a7f"/>
  <!-- Knight helmet visor -->
  <ellipse cx="50" cy="40" rx="22" ry="18" fill="#888"/>
  <rect x="28" y="36" width="44" height="14" rx="2" fill="#999"/>
  <!-- Visor slits -->
  <rect x="33" y="40" width="14" height="3" rx="1" fill="#333"/>
  <rect x="53" y="40" width="14" height="3" rx="1" fill="#333"/>
  <!-- Helmet crest -->
  <rect x="46" y="20" width="8" height="20" rx="2" fill="#c8a415"/>
  <ellipse cx="50" cy="20" rx="6" ry="4" fill="#e8c830"/>
  <!-- Bear face (visible below visor) -->
  <ellipse cx="50" cy="65" rx="22" ry="16" fill="#8b5e3c"/>
  <!-- Bear ears -->
  <circle cx="30" cy="54" r="8" fill="#8b5e3c"/>
  <circle cx="70" cy="54" r="8" fill="#8b5e3c"/>
  <circle cx="30" cy="54" r="5" fill="#c4956a"/>
  <circle cx="70" cy="54" r="5" fill="#c4956a"/>
  <!-- Eyes peeking under visor -->
  <circle cx="42" cy="58" r="4" fill="white"/>
  <circle cx="58" cy="58" r="4" fill="white"/>
  <circle cx="43" cy="59" r="2.5" fill="#3d2b1f"/>
  <circle cx="59" cy="59" r="2.5" fill="#3d2b1f"/>
  <circle cx="44" cy="58" r="1" fill="white"/>
  <circle cx="60" cy="58" r="1" fill="white"/>
  <!-- Snout -->
  <ellipse cx="50" cy="68" rx="9" ry="6" fill="#c4956a"/>
  <ellipse cx="50" cy="65" rx="4" ry="2.5" fill="#6b4a3a"/>
  <!-- Armor collar -->
  <rect x="30" y="76" width="40" height="8" rx="2" fill="#777"/>
  <line x1="50" y1="76" x2="50" y2="84" stroke="#555" stroke-width="2"/>
</svg>
